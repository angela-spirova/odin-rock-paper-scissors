<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>

    <script src="script.js" defer></script>
</head>
<body>
    <div id="choices">
        <button class="choice" id="rock">
            ROCK
        </button>
        <button class="choice" id="paper">
            PAPER
        </button>
        <button class="choice" id="scissors">
            SCISSORS
        </button>
    </div>
    <div>
        <p id="current-round-result"></p>
        <ul id="score-list">
            <li>Your score: <span id="human-score"></span></li>
            <li>Computer score: <span id="computer-score"></span></li>
        </ul>
    </div>
</body>
</html>
